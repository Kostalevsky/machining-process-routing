services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: machining-process-routing-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/machining_process_routing
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16
    container_name: machining-process-routing-db
    environment:
      POSTGRES_DB: machining_process_routing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
